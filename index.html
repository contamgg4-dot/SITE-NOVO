<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toxic Store</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0b0b0b;
    color:white;
}

/* TOPO */
.header{
    background:#111;
    padding:15px;
    text-align:center;
    color:#39ff14;
    font-weight:bold;
    font-size:20px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

/* PRODUTO */
.prod{
    background:#111;
    padding:15px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,255,0,0.2);
}

.prod h3{
    margin:0;
    font-size:16px;
}

.preco{
    color:#39ff14;
    font-weight:bold;
    margin:5px 0;
}

/* BOTÃO */
.btn{
    width:100%;
    padding:10px;
    background:#39ff14;
    color:black;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

/* CARRINHO */
.carrinho{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
    box-shadow:0 -2px 10px black;
}

/* PIX */
.pix{
    color:#39ff14;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
🛒 TOXIC STORE
</div>

<div class="grid">

<div class="prod">
<h3>1K Seguidores</h3>
<div class="preco">R$ 6</div>
<button class="btn" onclick="comprar('1K Seguidores - R$6')">Comprar</button>
</div>

<div class="prod">
<h3>2K Seguidores</h3>
<div class="preco">R$ 8</div>
<button class="btn" onclick="comprar('2K Seguidores - R$8')">Comprar</button>
</div>

<div class="prod">
<h3>5K Seguidores</h3>
<div class="preco">R$ 19</div>
<button class="btn" onclick="comprar('5K Seguidores - R$19')">Comprar</button>
</div>

<div class="prod">
<h3>Auxílio Coringa</h3>
<div class="preco">R$ 15</div>
<button class="btn" onclick="comprar('Auxílio Coringa - R$15')">Comprar</button>
</div>

<div class="prod">
<h3>Auxílio Online</h3>
<div class="preco">R$ 10</div>
<button class="btn" onclick="comprar('Auxílio Online - R$10')">Comprar</button>
</div>

<div class="prod">
<h3>Holograma + Antena</h3>
<div class="preco">R$ 8,90</div>
<button class="btn" onclick="comprar('Holograma + Antena - R$8,90')">Comprar</button>
</div>

</div>

<div class="carrinho">
<p id="item">Nenhum item selecionado</p>

<p>💳 Pix: <span class="pix">+5512991439382</span></p>

<button class="btn" onclick="finalizar()">
📲 Finalizar no WhatsApp
</button>
</div>

<script>
let pedido = "";

function comprar(item){
    pedido = item;
    document.getElementById("item").innerHTML = "🛒 " + item;
}

function finalizar(){
    if(pedido == ""){
        alert("Escolha um produto!");
        return;
    }

    let msg = "Quero comprar: " + pedido;
    let url = "https://wa.me/5512991439382?text=" + encodeURIComponent(msg);
    window.open(url);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARANHAS HACKERS</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #000000, #0d0d0d);
  color: white;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 15px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(0,255,200,0.2);
}

nav a {
  color: #00ffc8;
  text-decoration: none;
  font-weight: 600;
  cursor: pointer;
}

/* SECTIONS */
.section {
  display: none;
  padding: 60px 20px;
  text-align: center;
}

.active {
  display: block;
}

/* HERO */
.hero {
  max-width: 500px;
  margin: auto;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(0,255,200,0.15);
}

/* BOTÕES */
.btn {
  margin: 10px;
  padding: 14px 25px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
}

.discord { background: #5865F2; color: white; }
.whatsapp { background: #25D366; color: white; }
.instagram { background: #E1306C; color: white; }

/* FRASE */
.frase {
  margin-top: 60px;
  font-size: 20px;
}

.frase strong {
  color: #00ffc8;
}

/* NOTIFICAÇÃO */
#notificacao {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.8);
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 14px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s;
}
</style>
</head>

<body>

<nav>
  <a onclick="show('home')">Home</a>
  <a onclick="show('suporte')">Suporte</a>
  <a onclick="show('contato')">Contato</a>
</nav>

<div id="home" class="section active">
  <div class="hero">
    <h1>🕷️ ARANHAS HACKERS 🕸️</h1>
    <h2>🔥 Melhor vendedor de DRIP Client 🔥</h2>

    <button class="btn discord" onclick="window.open('https://discord.gg/766J2wFsC')">
      Discord
    </button>

    <button class="btn whatsapp" onclick="whats()">
      WhatsApp
    </button>
  </div>

  <div class="frase">
    <strong>Venha fazer parte</strong><br>
    "Tudo posso naquele que me fortalece."
  </div>
</div>

<div id="suporte" class="section">
  <div class="hero">
    <h1>📞 Suporte</h1>

    <button class="btn whatsapp" onclick="whats()">WhatsApp</button>

    <button class="btn instagram"
      onclick="window.open('https://www.instagram.com/wz__pedroxzx?igsh=YzVpbzNrZ2s4bmlr')">
      Instagram
    </button>
  </div>
</div>

<div id="contato" class="section">
  <div class="hero">
    <h1>📲 Contato</h1>
    <button class="btn whatsapp" onclick="whats()">Falar agora</button>
  </div>
</div>

<!-- NOTIFICAÇÃO -->
<div id="notificacao"></div>

<script>
function show(sec) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(sec).classList.add('active');
}

function whats() {
  let num = "5512991439382";
  let msg = "Suporte - ARANHAS HACKERS 🕷️🕸️";
  window.open("https://wa.me/" + num + "?text=" + encodeURIComponent(msg));
}

/* NOMES */
const nomes = [
"Lucas","Pedro","João","Matheus","Gabriel","Rafael","Bruno","Felipe","Carlos",
"Henrique","Gustavo","Vinicius","Eduardo","André","Thiago","Diego","Leonardo",
"Caio","Daniel","Samuel","Arthur","Miguel","Davi","Enzo","Nicolas","Vitor"
];

/* PLANOS */
const planos = [
"Key 1 dia",
"Key 7 dias",
"Key 14 dias",
"Key 30 dias"
];

function mostrarNotificacao() {
  const box = document.getElementById("notificacao");

  let nome = nomes[Math.floor(Math.random() * nomes.length)];
  let plano = planos[Math.floor(Math.random() * planos.length)];

  box.innerText = nome + " comprou " + plano;
  box.style.opacity = 1;
  box.style.transform = "translateY(0)";

  setTimeout(() => {
    box.style.opacity = 0;
    box.style.transform = "translateY(20px)";
  }, 3000);
}

setInterval(mostrarNotificacao, 4000);
</script>

</body>
</html>

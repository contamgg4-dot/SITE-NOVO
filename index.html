<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ARANHA TRADES</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --card:#121212;
  --primary:#5da9ff;
  --secondary:#9b5cff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:linear-gradient(270deg,#0a0a0a,#111,#0a0a0a);
  background-size:600% 600%;
  animation:bgMove 15s ease infinite;
  color:#fff;
}

/* FUNDO ANIMADO */
@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loader-text{
  font-size:20px;
  letter-spacing:3px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{opacity:0.3;}
  50%{opacity:1;}
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #ffffff10;
}

nav a{
  margin-left:20px;
  color:#ccc;
  text-decoration:none;
  transition:.3s;
}
nav a:hover{color:#fff;}

/* SEÇÕES */
section{
  padding:120px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

/* HERO */
.hero h1{
  font-size:3rem;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  color:#aaa;
  margin-top:10px;
}

/* BOTÕES */
.btn{
  display:inline-block;
  margin:10px;
  padding:12px 24px;
  border-radius:30px;
  background:rgba(255,255,255,0.05);
  border:1px solid #ffffff20;
  backdrop-filter:blur(10px);
  transition:.3s;
  text-decoration:none;
  color:#fff;
}

.btn:hover{
  transform:translateY(-3px);
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  color:#000;
}

/* CARDS */
.card{
  max-width:320px;
  margin:20px auto;
  padding:20px;
  background:var(--card);
  border-radius:15px;
  border:1px solid #ffffff10;
}

/* CHAT */
.chat-box{
  max-width:400px;
  margin:auto;
  padding:20px;
  background:var(--card);
  border-radius:15px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#000;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  cursor:pointer;
}

/* RESPONSIVO */
@media(max-width:768px){
.hero h1{font-size:2rem;}
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-text">ARANHA TRADES</div>
</div>

<header>
<h2>ARANHA TRADES</h2>
<nav>
<a href="#home">Home</a>
<a href="#sobre">Sobre</a>
<a href="#resultados">Resultados</a>
<a href="#contato">Contato</a>
<a href="#chat">Chat</a>
</nav>
</header>

<!-- HOME -->
<section id="home" class="hero">
<h1>ARANHA TRADES</h1>
<p>Alta performance no trading</p>

<a class="btn" href="https://chat.whatsapp.com/H2JzzQL7n8D89gZfvBccbf?mode=gi_t">Entrar no Grupo</a>
<a class="btn" href="https://wa.me/5512991439382">Falar Comigo</a>
</section>

<!-- SOBRE -->
<section id="sobre">
<h2>Sobre</h2>
<p>Estratégias consistentes e acompanhamento profissional.</p>
</section>

<!-- RESULTADOS -->
<section id="resultados">
<h2>Resultados</h2>

<div class="card">
<p>📸 Resultado</p>
<img src="https://via.placeholder.com/300" width="100%">
</div>

</section>

<!-- CONTATO -->
<section id="contato">
<h2>Contato</h2>
<a class="btn" href="https://chat.whatsapp.com/H2JzzQL7n8D89gZfvBccbf?mode=gi_t">Entrar no Grupo</a>
<a class="btn" href="https://wa.me/5512991439382">WhatsApp</a>
</section>

<!-- CHAT -->
<section id="chat">
<h2>Falar comigo</h2>

<div class="chat-box">
<input type="text" id="nome" placeholder="Seu nome">
<textarea id="msg" placeholder="Mensagem"></textarea>
<button onclick="enviarMsg()">Enviar</button>
</div>

</section>

<script>
/* LOADER */
window.addEventListener("load", ()=>{
  document.getElementById("loader").style.display="none";
});

/* ANIMAÇÃO SCROLL */
const sections = document.querySelectorAll("section");
window.addEventListener("scroll", ()=>{
  sections.forEach(sec=>{
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
});

/* WHATSAPP */
function enviarMsg(){
let nome = document.getElementById("nome").value;
let msg = document.getElementById("msg").value;

let texto = `Olá, sou ${nome}. ${msg}`;
let url = "https://wa.me/5512991439382?text=" + encodeURIComponent(texto);

window.open(url, "_blank");
}
</script>

</body>
</html>

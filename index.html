<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aranha Store</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #05070d;
  color: white;
  padding-bottom: 120px;
}

/* TELAS */
.tela { display: none; }
.ativa { display: block; }

/* TOPO */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #0b0f1a;
}

.logo {
  color: #00aaff;
  font-weight: bold;
}

/* LOJA */
.container { padding: 15px; }

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #0b0f1a;
  border-radius: 15px;
  overflow: hidden;
}

.card img { width: 100%; }

.card-body { padding: 10px; }

.preco-antigo {
  text-decoration: line-through;
  color: #888;
}

.preco {
  color: #00ffcc;
}

.btn {
  width: 100%;
  padding: 10px;
  background: white;
  border: none;
  border-radius: 10px;
  margin-top: 5px;
  cursor: pointer;
}

/* PAGAMENTO */
.pagamento {
  text-align: center;
  padding: 20px;
}

/* FOOTER BOTÕES GRANDES */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: #05070d;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* BOTÃO WHATS */
.btn-whats {
  display: block;
  text-align: center;
  padding: 15px;
  background: linear-gradient(90deg, #25d366, #1ebe5d);
  color: white;
  font-weight: bold;
  border-radius: 15px;
  text-decoration: none;
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

/* BOTÃO INSTAGRAM */
.btn-insta {
  display: block;
  text-align: center;
  padding: 15px;
  background: linear-gradient(90deg, #ff4d4d, #ff00cc);
  color: white;
  font-weight: bold;
  border-radius: 15px;
  text-decoration: none;
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<header>
  <div class="logo">🕷️ ARANHA STORE</div>
</header>

<!-- LOJA -->
<div id="loja" class="tela ativa">
  <div class="container">
    <div class="grid">

      <div class="card">
        <img src="https://via.placeholder.com/300x150?text=Online">
        <div class="card-body">
          <div>Auxílio Online</div>
          <div class="preco-antigo">R$ 25</div>
          <div class="preco">R$ 9,99</div>
          <button class="btn" onclick="abrirPagamento('Auxílio Online', 9.99)">Comprar</button>
        </div>
      </div>

      <div class="card">
        <img src="https://via.placeholder.com/300x150?text=Fixo">
        <div class="card-body">
          <div>Auxílio Fixo</div>
          <div class="preco-antigo">R$ 30</div>
          <div class="preco">R$ 10,99</div>
          <button class="btn" onclick="abrirPagamento('Auxílio Fixo', 10.99)">Comprar</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- PAGAMENTO -->
<div id="pagamento" class="tela pagamento">
  <h2 id="produtoNome"></h2>
  <h3 id="valorProduto"></h3>

  <p>Chave PIX:</p>
  <strong>12 99143-9382</strong>

  <div id="qrcode"></div>

  <button class="btn" onclick="jaPaguei()">Já paguei</button>
  <button class="btn" onclick="voltar()">Voltar</button>
</div>

<!-- BOTÕES GRANDES -->
<div class="footer">
  <a href="https://wa.me/5512991439382" class="btn-whats">
    📱 FALAR NO WHATSAPP
  </a>

  <a href="https://www.instagram.com/_aranha_store_" class="btn-insta">
    📸 ME SIGA NO INSTAGRAM
  </a>
</div>

<script>
let produtoSelecionado = "";

function abrirPagamento(produto, valor) {
  produtoSelecionado = produto;

  document.getElementById("loja").classList.remove("ativa");
  document.getElementById("pagamento").classList.add("ativa");

  document.getElementById("produtoNome").innerText = produto;
  document.getElementById("valorProduto").innerText = "R$ " + valor;

  document.getElementById("qrcode").innerHTML = "";

  let payload = "PIX|12991439382|" + valor + "|" + produto;

  new QRCode(document.getElementById("qrcode"), {
    text: payload,
    width: 200,
    height: 200
  });
}

function voltar() {
  document.getElementById("pagamento").classList.remove("ativa");
  document.getElementById("loja").classList.add("ativa");
}

function jaPaguei() {
  let msg = "Já paguei o PIX do " + produtoSelecionado + " 💸%0A%0ASegue meu comprovante 👇";
  window.location.href = "https://wa.me/5512991439382?text=" + msg;
}
</script>

</body>
</html>
